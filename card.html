<!DOCTYPE html>
<html lang="zh-CN" data-rgb-grid="16x16x16">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syruph_dot - Soph Dot Net</title>
    <link rel="icon" id="favicon" href="icon01.png" type="image/png">
    <link rel="stylesheet" href="css/mobile-framework.css?v=20260518-scrollbar-hide">
    <link rel="stylesheet" href="css/ggmetro.css?v=20260518-scrollbar-hide">
    <script src="js/shared-header.js?v=20260518-shared-header" defer></script>
    <style>
        :root {
            --grid-white: #fff;
            --grid-paper: #eee;
            --grid-line: #ccc;
            --grid-line-soft: #ddd;
            --grid-text: #333;
            --grid-muted: #777;
            --grid-link: #06c;
            --grid-blue: #39c;
            --grid-red: #c33;
            --grid-orange: #f90;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(#fff, #eee 72%, #ddd),
                repeating-linear-gradient(0deg, rgba(0,0,0,0.07) 0, rgba(0,0,0,0.07) 1px, transparent 1px, transparent 4px);
            color: var(--grid-text);
            font-family: SimSun, "宋体", serif;
        }

        .retro-page {
            width: 100%;
            min-height: 100vh;
        }

        .retro-shell {
            position: relative;
            width: min(960px, calc(100% - 24px));
            margin: 18px auto 36px;
            border: 1px solid var(--grid-line);
            background: var(--grid-white);
            box-shadow: 0 1px 0 #fff inset, 0 2px 6px rgba(0,0,0,0.13);
            z-index: 0;
        }

        .retro-shell::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('images/banner4t3-1.PNG') center / cover no-repeat;
            opacity: 0.2;
            pointer-events: none;
            z-index: -1;
        }

        .retro-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 6px 10px;
            border-bottom: 1px solid var(--grid-line);
            background: linear-gradient(#fff, #eee);
            color: #666;
            font-size: 12px;
            line-height: 1.4;
        }

        .retro-toolbar a {
            color: var(--grid-link);
            text-decoration: none;
        }

        .retro-toolbar a:hover {
            text-decoration: underline;
        }

        .retro-card {
            display: grid;
            grid-template-columns: 170px 1fr 210px;
            min-height: 360px;
            background: linear-gradient(90deg, #eee, #fff 24%, #fff 72%, #eee);
        }

        .retro-side,
        .retro-main,
        .retro-aside {
            padding: 16px;
        }

        .retro-side {
            border-right: 1px solid var(--grid-line-soft);
            background: linear-gradient(#fff, #eee);
        }

        .retro-aside {
            border-left: 1px solid var(--grid-line-soft);
            background: linear-gradient(#eee, #eee);
        }

        .avatar-box {
            width: 96px;
            height: 96px;
            margin: 0 auto 12px;
            border: 1px solid #999;
            background:
                linear-gradient(135deg, #eee, #ccc),
                repeating-linear-gradient(45deg, transparent 0, transparent 6px, rgba(255,255,255,0.47) 6px, rgba(255,255,255,0.47) 12px);
            box-shadow: 0 1px 0 #fff inset;
            display: grid;
            place-items: center;
            color: #666;
            font: 22px/1 FangSong, STFangsong, "仿宋", SimSun, serif;
            letter-spacing: 0;
        }

        .side-note {
            margin-top: 8px;
            padding: 6px;
            border: 1px solid var(--grid-line);
            background: #fff;
            color: #777;
            font-size: 12px;
            line-height: 1.6;
        }

        .retro-main {
            min-width: 0;
        }

        .profile-head {
            padding-bottom: 12px;
            border-bottom: 1px solid var(--grid-line);
        }

        .profile-name {
            margin: 0 0 6px;
            color: #222;
            font: 32px/1.15 FangSong, STFangsong, "仿宋", SimSun, serif;
            letter-spacing: 0;
            text-shadow: 0 1px 0 #fff;
        }

        .profile-id {
            color: var(--grid-muted);
            font-size: 12px;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
            margin-top: 10px;
            font-size: 12px;
            color: #777;
        }

        .meta-row span {
            padding: 0 9px;
            border-right: 1px solid var(--grid-line);
        }

        .meta-row span:first-child {
            padding-left: 0;
        }

        .meta-row span:last-child {
            border-right: 0;
        }

        .profile-section {
            margin-top: 14px;
            border: 1px solid var(--grid-line);
            background: #fff;
        }

        .section-title {
            padding: 6px 8px;
            border-bottom: 1px solid var(--grid-line);
            background: linear-gradient(#fff, #eee);
            color: #333;
            font: 18px/1.2 FangSong, STFangsong, "仿宋", SimSun, serif;
        }

        .section-body {
            padding: 10px 12px;
            font-size: 14px;
            line-height: 1.85;
        }

        .interest-list {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .interest-list li {
            padding: 6px 0;
            border-bottom: 1px dotted var(--grid-line);
        }

        .interest-list li:last-child {
            border-bottom: 0;
        }

        .label {
            display: inline-block;
            min-width: 4em;
            color: #555;
            font-family: FangSong, STFangsong, "仿宋", SimSun, serif;
            font-size: 16px;
        }

        .remark {
            margin-top: 10px;
            padding: 8px 10px;
            border: 1px solid #ddd;
            background: linear-gradient(#fff, #eee);
            color: #555;
            font-size: 14px;
            line-height: 1.8;
        }

        .weibo-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid var(--grid-line-soft);
            color: #999;
            font-size: 12px;
        }

        .weibo-actions span {
            padding: 0 10px;
            border-right: 1px solid var(--grid-line);
        }

        .weibo-actions span:first-child {
            padding-left: 0;
        }

        .weibo-actions span:last-child {
            border-right: 0;
        }

        .aside-block {
            margin-bottom: 12px;
            border: 1px solid var(--grid-line);
            background: #fff;
        }

        .aside-title {
            padding: 5px 7px;
            border-bottom: 1px solid var(--grid-line);
            background: linear-gradient(#fff, #eee);
            color: #555;
            font-size: 12px;
            font-weight: bold;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
            padding: 8px;
        }

        .swatch {
            height: 18px;
            border: 1px solid #999;
        }

        .swatch.white { background: #fff; }
        .swatch.paper { background: #eee; }
        .swatch.line { background: #ccc; }
        .swatch.blue { background: #39c; }
        .swatch.red { background: #c33; }
        .swatch.orange { background: #f90; }

        .aside-list {
            padding: 8px 10px;
            color: #666;
            font-size: 12px;
            line-height: 1.8;
        }

        .aside-list a {
            color: var(--grid-link);
            text-decoration: none;
        }

        .aside-list a:hover {
            text-decoration: underline;
        }

        .retro-footer {
            padding: 8px 10px;
            border-top: 1px solid var(--grid-line);
            background: linear-gradient(#eee, #fff);
            color: #999;
            font-size: 12px;
            text-align: right;
        }

        @media (max-width: 760px) {
            .retro-shell {
                width: calc(100% - 16px);
                margin-top: 10px;
            }

            .retro-card {
                grid-template-columns: 1fr;
            }

            .retro-side,
            .retro-aside {
                border-right: 0;
                border-left: 0;
            }

            .retro-side {
                border-bottom: 1px solid var(--grid-line-soft);
            }

            .retro-aside {
                border-top: 1px solid var(--grid-line-soft);
            }

            .profile-name {
                font-size: 28px;
            }
        }

        /* ===== IE11 FALLBACKS ===== */
        @media all and (-ms-high-contrast: none), (-ms-high-contrast: active) {
            body { color: #333; }
            .retro-shell { border-color: #ccc; background: #fff; }
            .retro-toolbar { border-bottom-color: #ccc; }
            .retro-toolbar a { color: #06c; }
            .retro-side { border-right-color: #ddd; }
            .retro-aside { border-left-color: #ddd; }
            .side-note { border-color: #ccc; }
            .profile-head { border-bottom-color: #ccc; }
            .profile-id { color: #777; }
            .meta-row span { border-right-color: #ccc; }
            .profile-section { border-color: #ccc; }
            .section-title { border-bottom-color: #ccc; }
            .interest-list li { border-bottom-color: #ccc; }
            .weibo-actions { border-top-color: #ddd; }
            .weibo-actions span { border-right-color: #ccc; }
            .aside-block { border-color: #ccc; }
            .aside-title { border-bottom-color: #ccc; }
            .aside-list a { color: #06c; }
            .retro-footer { border-top-color: #ccc; }
        }
    </style>
</head>
<body class="theme-c">
    <div class="retro-page">
        <div id="topbar-placeholder"></div>

        <main class="retro-shell" aria-labelledby="profileName">
            <div class="retro-toolbar">
                <span>名片</span>
                <span><a href="index.html">返回首页</a> | <a href="blog.html">博客</a></span>
            </div>

            <section class="retro-card">
                <aside class="retro-side" aria-label="头像与状态">
                    <div class="avatar-box">Syr</div>
                </aside>

                <article class="retro-main">
                    <header class="profile-head">
                        <h1 class="profile-name" id="profileName">Syruph_dot / SKK</h1>
                        <div class="profile-id">SophDotNet · Stay Tuned and Detached</div>
                        <div class="meta-row" aria-label="页面元信息">
                            <span>前沿探索</span>
                            <span>复古设计</span>
                        </div>
                    </header>

                    <section class="profile-section" aria-labelledby="interestTitle">

                        <div class="section-body">
                            <ul class="interest-list">
                                <li><span class="label">IP</span>东方Project、BA</li>

                    <section class="profile-section" aria-labelledby="majorTitle">

                    </section>

                    <div class="remark">想玩硬件，设计电路焊电路，但是完全没空（笑</div>

                    <div class="weibo-actions" aria-label="微博式操作栏">
                        <span>转发</span>
                        <span>评论</span>
                        <span>收藏</span>
                        <span>赞</span>
                    </div>
                </article>

                <aside class="retro-aside" aria-label="页面说明">
                    <div class="aside-block">
                        <div class="aside-title">色板</div>
                        <div class="color-grid" aria-label="16阶RGB色板">
                            <span class="swatch white"></span>
                            <span class="swatch paper"></span>
                            <span class="swatch line"></span>
                            <span class="swatch blue"></span>
                            <span class="swatch red"></span>
                            <span class="swatch orange"></span>
                        </div>
                    </div>

                    <div class="aside-block">
                        <div class="aside-title">链接</div>
                        <div class="aside-list">
                            <a href="index.html">Soph Dot Net</a><br>
                            <a href="gallery.html">图集</a><br>
                            <a href="artifacts.html">杂物间</a>
                        </div>
                    </div>
                </aside>
            </section>

            <footer class="retro-footer">© 2011 千年民科网络 Soph Dot Net</footer>
        </main>
    </div>
</body>
</html>
