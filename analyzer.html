<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文段分析器 · Human vs AIGC</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f5f7fa; color: #1a1a2e; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }

header { text-align: center; padding: 20px 0 10px; }
header h1 { font-size: 1.6em; font-weight: 700; }
header p { color: #666; font-size: 0.9em; margin-top: 4px; }

/* Input panel */
.input-panel { background: #fff; border-radius: 12px; padding: 20px; margin: 16px 0; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.drop-zone { border: 2px dashed #c0c4cc; border-radius: 10px; padding: 30px 20px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
.drop-zone.dragover { border-color: #2e86ab; background: #eef6fa; }
.drop-zone p { color: #888; font-size: 0.95em; }
.drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
textarea { width: 100%; min-height: 80px; border: 1px solid #d0d4dc; border-radius: 8px; padding: 10px; font-size: 0.9em; resize: vertical; margin-top: 12px; }
textarea:focus { outline: none; border-color: #2e86ab; }
.input-row { display: flex; gap: 12px; align-items: center; margin-top: 12px; }
.input-row button { background: #2e86ab; color: #fff; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 0.9em; }
.input-row button:hover { background: #23708f; }
.input-row .file-name { color: #666; font-size: 0.85em; }

/* Metrics cards */
.metrics { display: grid; grid-template-columns: 1fr; gap: 8px; margin: 16px 0; }
.card { background: #fff; border-radius: 10px; padding: 12px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 16px; }
.card .label { font-size: 0.8em; color: #888; text-transform: uppercase; letter-spacing: 0.03em; min-width: 90px; flex-shrink: 0; }
.card .value { font-size: 1.4em; font-weight: 700; min-width: 70px; }
.card .sub { font-size: 0.75em; color: #888; margin-left: auto; text-align: right; }
.card .sub .z-h { color: #2e86ab; }
.card .sub .z-a { color: #ca562c; }

/* Charts grid */
.charts { display: grid; gap: 12px; margin: 16px 0; }
.chart-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px; }
.chart-row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.chart-box { background: #fff; border-radius: 10px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.chart-box h3 { font-size: 0.85em; color: #555; margin-bottom: 8px; font-weight: 600; }
.chart-box svg { display: block; width: 100%; }
.chart-full { grid-column: 1 / -1; }

/* Tooltip */
.tooltip { position: absolute; background: rgba(0,0,0,0.8); color: #fff; padding: 6px 10px; border-radius: 5px; font-size: 0.8em; pointer-events: none; opacity: 0; transition: opacity 0.15s; }
.tooltip.show { opacity: 1; }

/* Loading */
.loading { text-align: center; padding: 40px; color: #999; }

@media (max-width: 700px) {
  .card { flex-wrap: wrap; gap: 4px 12px; }
  .card .sub { margin-left: 0; text-align: left; width: 100%; }
  .chart-row, .chart-row-3 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>文段分析器</h1>
    <p>上传或粘贴文本 → 实时计算熵曲线 / 压缩比 / 文体特征 · 对比 Human vs AIGC 参考档案</p>
  </header>

  <div class="input-panel">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".md,.txt">
      <p>拖拽文件到此处，或点击选择文件 (.md / .txt)</p>
    </div>
    <textarea id="textInput" placeholder="或直接在此粘贴文本..."></textarea>
    <div class="input-row">
      <button id="analyzeBtn">分析</button>
      <span class="file-name" id="fileName"></span>
    </div>
  </div>

  <div class="metrics" id="metricsRow">
    <div class="card"><div class="label">最终熵</div><div class="value" id="mFinalEntropy">-</div><div class="sub" id="mFinalEntropySub"></div></div>
    <div class="card"><div class="label">压缩比 (gzip)</div><div class="value" id="mCompRatio">-</div><div class="sub" id="mCompRatioSub"></div></div>
    <div class="card"><div class="label">标点率</div><div class="value" id="mPuncRatio">-</div><div class="sub" id="mPuncRatioSub"></div></div>
    <div class="card"><div class="label">独特字符比</div><div class="value" id="mUniqueRatio">-</div><div class="sub" id="mUniqueRatioSub"></div></div>
  </div>

  <div class="charts">
    <div class="chart-box chart-full">
      <h3>① 熵曲线 — 滑窗局部熵 vs 参考档案 (Human / AIGC)</h3>
      <div id="entropyChart" style="position:relative"></div>
    </div>
    <div class="chart-row-3">
      <div class="chart-box">
        <h3>② 压缩比曲线 — 滑窗 gzip 压缩率</h3>
        <div id="compCurve" style="position:relative"></div>
      </div>
      <div class="chart-box">
        <h3>③ 标点率曲线 — 滑窗标点密度</h3>
        <div id="puncCurve" style="position:relative"></div>
      </div>
      <div class="chart-box">
        <h3>④ 独特字符比曲线 — 滑窗字符多样性</h3>
        <div id="uniqCurve" style="position:relative"></div>
      </div>
    </div>
    <div class="chart-box chart-full">
      <h3>⑤ 特征雷达 — 6 维标准化对比</h3>
      <div id="radarChart"></div>
    </div>
  </div>

  </div>
<div class="tooltip" id="tooltip"></div>

  const all = [];

    for (const f of RADAR_FEATS) {
      const s = REF[grp].scalar[f];
      all.push(s.mean - 2*s.std);
      all.push(s.mean + 2*s.std);
    }
  }
  return { min: Math.min(...all), max: Math.max(...all) };
}

// ════════════════════════════════════════════════════════════════
// 2. Client-side analysis functions
// ════════════════════════════════════════════════════════════════

function shannonEntropy(text) {
  if (!text) return 0;
  const len = text.length;
  const freq = {};
  for (const ch of text) freq[ch] = (freq[ch] || 0) + 1;
  let H = 0;
  for (const ch in freq) {
    const p = freq[ch] / len;
    H -= p * Math.log2(p);
  }
  return H;
}

function localEntropyCurve(text, windowSize=300, stride=150) {
  const L = text.length;
  const rows = [];
  let start = 0, idx = 0;
  while (start < L) {
    const end = Math.min(start + windowSize, L);
    const chunk = text.slice(start, end);
    const e = shannonEntropy(chunk);
    rows.push({ pos: (start + end) / 2 / L, entropy: e, idx });
    if (end >= L) break;
    start += stride;
    idx++;
  }
  return rows;
}

function localPunctuationCurve(text, windowSize=300, stride=150) {
  const L = text.length;
  const rows = [];
  let start = 0;
  while (start < L) {
    const end = Math.min(start + windowSize, L);
    const chunk = text.slice(start, end);
    const punc = [...chunk].filter(ch => !/[a-zA-Z0-9一-鿿]/.test(ch) && !/\s/.test(ch)).length;
    rows.push({ pos: (start + end) / 2 / L, value: punc / chunk.length });
    if (end >= L) break;
    start += stride;
  }
  return rows;
}

function localUniqueCurve(text, windowSize=300, stride=150) {
  const L = text.length;
  const rows = [];
  let start = 0;
  while (start < L) {
    const end = Math.min(start + windowSize, L);
    const chunk = text.slice(start, end);
    rows.push({ pos: (start + end) / 2 / L, value: new Set(chunk).size / chunk.length });
    if (end >= L) break;
    start += stride;
  }
  return rows;
}

async function localCompressionCurve(text, windowSize=300, stride=150) {
  const L = text.length;
  const rows = [];
  let start = 0;
  while (start < L) {
    const end = Math.min(start + windowSize, L);
    const chunk = text.slice(start, end);
    const ratio = chunk.length > 10 ? await compressionRatio(chunk) : 1;
    rows.push({ pos: (start + end) / 2 / L, value: ratio });
    if (end >= L) break;
    start += stride;
  }
  return rows;
}

async function compressionRatio(text) {
  if (!text) return 1;
  const encoder = new TextEncoder();
  const bytes = encoder.encode(text);
  const cs = new CompressionStream('gzip');
  const writer = cs.writable.getWriter();
  writer.write(bytes);
  writer.close();
  const reader = cs.readable.getReader();
  const chunks = [];
  while (true) {
    const {value, done} = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const compressed = chunks.reduce((acc, c) => {
    const a = new Uint8Array(acc.length + c.length);
    a.set(acc, 0);
    a.set(c, acc.length);
    return a;
  }, new Uint8Array(0));
  return compressed.length / bytes.length;
}

function stripMarkdown(md) {
  if (!md) return '';
  let text = md
    // remove fenced code blocks (preserving a placeholder)
    .replace(/```[\s\S]*?```/g, '')
    .replace(/~~~[\s\S]*?~~~/g, '')
    // headings markers
    .replace(/^#{1,6}\s+/gm, '')
    // blockquotes
    .replace(/^>\s+/gm, '')
    // list markers
    .replace(/^[-*+]\s+/gm, '')
    .replace(/^\d+\.\s+/gm, '')
    // horizontal rules
    .replace(/^[-*_]{3,}\s*$/gm, '\n')
    // bold/italic **text** __text__ *text* _text_
    .replace(/(\*{1,3})(.*?)\1/g, '$2')
    .replace(/(_{1,3})(.*?)\1/g, '$2')
    // inline code
    .replace(/`{1,3}[^`\n]*`{1,3}/g, '')
    // images ![alt](url)
    .replace(/!\[([^\]]*)\]\([^)]*\)/g, '$1')
    // links [text](url)
    .replace(/\[([^\]]*)\]\([^)]*\)/g, '$1')
    // table: remove separator rows (|---|---|) and data rows
    .replace(/^\|?[\s:.-]+\|[\s:.-]+\|[\s:.-]*\|?\s*$/gm, '')
    .replace(/^\|.*\|.*\|.*$/gm, '')
    .replace(/\|(?!$)/g, ' ')
    // HTML tags
    .replace(/<[^>]+>/g, '')
    // condense whitespace
    .replace(/\n{3,}/g, '\n\n')
    .replace(/[ \t]{2,}/g, ' ')
    .trim();
  return text;
}

function extractScalarFeatures(text) {
  if (!text) return null;
  const L = text.length;
  const words = text.split(/\s+/);
  const lines = text.split('\n');
  const nonEmpty = lines.filter(l => l.trim());
  const paras = text.split(/\n\n+/).filter(p => p.trim());

  const final_entropy = shannonEntropy(text);

  const curve = localEntropyCurve(text, Math.min(600, L), Math.max(1, Math.min(300, L/2)));
  const localVals = curve.map(r => r.entropy);
  const local_entropy_mean = localVals.reduce((a,b)=>a+b,0) / localVals.length;
  const local_entropy_std = Math.sqrt(localVals.reduce((s,v)=>s+(v-local_entropy_mean)**2,0) / localVals.length);

  const deriv = [];
  for (let i = 1; i < localVals.length; i++) deriv.push(Math.abs(localVals[i] - localVals[i-1]));
  const derivative_energy = deriv.reduce((a,b)=>a+b,0);

  const punc = [...text].filter(ch => !/[a-zA-Z0-9一-鿿]/.test(ch) && !/\s/.test(ch)).length;
  const punctuation_ratio = punc / L;

  const totalLen = nonEmpty.reduce((s,l)=>s+l.length,0);
  const avg_line_length = nonEmpty.length ? totalLen / nonEmpty.length : 0;

  const paraLens = paras.map(p => p.length);
  const para_entropy = paraLens.length ? shannonEntropy(paraLens.join(' ')) : 0;

  const unique_ratio = new Set(text).size / L;

  return {
    final_entropy, local_entropy_mean, local_entropy_std, derivative_energy,
    punctuation_ratio, avg_line_length, para_entropy, unique_ratio, char_count: L,
  };
}

function zScore(val, mean, std) {
  return std > 1e-8 ? (val - mean) / std : 0;
}

function profileDistance(feats, profile) {
  const names = ['final_entropy','local_entropy_mean','local_entropy_std','compression_ratio_zlib',
                 'punctuation_ratio','avg_line_length','para_entropy','unique_ratio'];
  const zs = {};
  let totalAbs = 0, n = 0;
  for (const f of names) {
    if (feats[f] === undefined) continue;
    const p = profile.scalar[f];
    if (!p) continue;
    const z = zScore(feats[f], p.mean, p.std);
    zs[f+'_z'] = z;
    totalAbs += Math.abs(z);
    n++;
  }
  return { mean_abs_z: n ? totalAbs / n : Infinity, zs };
}

function renderRadar(feats) {
  const container = document.getElementById('radarChart');
  container.innerHTML = '';
  const W = container.clientWidth || 340;
  const H = 300;
  const cx = W / 2, cy = H / 2, R = Math.min(W, H) * 0.35;

  const svg = d3.select(container).append('svg').attr('width', W).attr('height', H);
  const g = svg.append('g').attr('transform', `translate(${cx},${cy})`);

  // Compute normalized values
  const allVals = {};
  for (const grp of ['human','aigc']) {
    for (const f of RADAR_FEATS) {
      const s = REF[grp].scalar[f];
      if (!allVals[f]) allVals[f] = [];
      allVals[f].push(s.mean - 2*s.std, s.mean + 2*s.std);
    }
  }
  if (feats) {
    for (const f of RADAR_FEATS) {
      if (feats[f] !== undefined) allVals[f].push(feats[f]);
    }
  }
  const gmin = {}, gmax = {};
  for (const f of RADAR_FEATS) {
    gmin[f] = Math.min(...allVals[f]);
    gmax[f] = Math.max(...allVals[f]);
  }

  function norm(val, f) { return (val - gmin[f]) / Math.max(gmax[f] - gmin[f], 1e-8); }

  const nFeats = RADAR_FEATS.length;
  const angle = d3.scaleLinear().domain([0, nFeats]).range([0, 2*Math.PI]);
  const rScale = d3.scaleLinear().domain([0, 1]).range([0, R]);

  // Grid rings
  for (let lv = 0.25; lv <= 1; lv += 0.25) {
    g.append('circle').attr('r', rScale(lv)).attr('fill','none').attr('stroke','#ddd').attr('stroke-width',0.5);
    g.append('text').attr('x', 3).attr('y', -rScale(lv)).attr('font-size','8').attr('fill','#bbb').text(lv.toFixed(2));
  }

  // Axes
  for (let i = 0; i < nFeats; i++) {
    const a = angle(i) - Math.PI/2;
    const x = rScale(1) * Math.cos(a);
    const y = rScale(1) * Math.sin(a);
    g.append('line').attr('x1',0).attr('y1',0).attr('x2',x).attr('y2',y).attr('stroke','#ddd').attr('stroke-width',0.5);
    const lx = rScale(1.08) * Math.cos(a);
    const ly = rScale(1.08) * Math.sin(a);
    g.append('text').attr('x', lx).attr('y', ly).attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('font-size','8').attr('fill','#555').text(RADAR_FEATS[i].replace(/_/g,' '));
  }

  function radarPath(ref, key) {
    const pts = [];
    for (let i = 0; i < nFeats; i++) {
      const f = RADAR_FEATS[i];
      const val = key === 'input' ? ref[f] : ref[key][f].mean;
      const v = norm(val, f);
      const a = angle(i) - Math.PI/2;
      pts.push([rScale(v) * Math.cos(a), rScale(v) * Math.sin(a)]);
    }
    const first = pts[0];
    return pts.map((p, i) => `${i===0?'M':'L'}${p[0]},${p[1]}`).join(' ') + 'Z';
  }

  // Human reference
  g.append('path').attr('d', radarPath(REF.human, 'scalar')).attr('fill','#2e86ab').attr('opacity',0.15).attr('stroke','#2e86ab').attr('stroke-width',1.5).attr('stroke-dasharray','3,2');

  // AIGC reference
  g.append('path').attr('d', radarPath(REF.aigc, 'scalar')).attr('fill','#ca562c').attr('opacity',0.15).attr('stroke','#ca562c').attr('stroke-width',1.5).attr('stroke-dasharray','3,2');

  // Input
  if (feats) {
    g.append('path').attr('d', radarPath(feats, 'input')).attr('fill','none').attr('stroke','#111').attr('stroke-width',2);
    const pts = [];
    for (let i = 0; i < nFeats; i++) {
      const f = RADAR_FEATS[i];
      const val = feats[f];
      if (val === undefined) continue;
      const v = norm(val, f);
      const a = angle(i) - Math.PI/2;
      pts.push([rScale(v) * Math.cos(a), rScale(v) * Math.sin(a)]);
    }
    pts.forEach(p => g.append('circle').attr('cx', p[0]).attr('cy', p[1]).attr('r', 4).attr('fill', '#111'));
  }

  // Legend
  const leg = svg.append('g').attr('transform', `translate(10, ${H-50})`);
  for (const [i,item] of [['Human','#2e86ab'],['AIGC','#ca562c'],['上传','#111']].entries()) {
    leg.append('rect').attr('x', i*90).attr('y', 0).attr('width',10).attr('height',10).attr('fill', item[1]).attr('opacity', 0.7);
    leg.append('text').attr('x', i*90+14).attr('y', 9).attr('font-size','10').attr('fill','#555').text(item[0]);
  }
}

function renderMetricCurve(containerId, data, refHuman, refAigc, opts) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  const W = container.clientWidth || 340;
  const H = opts.height || 250;
  const w = W - MARGIN.left - MARGIN.right;
  const h = H - MARGIN.top - MARGIN.bottom;

  const svg = d3.select(container).append('svg').attr('width', W).attr('height', H);
  const g = svg.append('g').attr('transform', `translate(${MARGIN.left},${MARGIN.top})`);

  const xScale = d3.scaleLinear().domain([0, 1]).range([0, w]);

  // Compute yDomain from reference ±3σ + data
  let yMin = Infinity, yMax = -Infinity;
  for (const ref of [refHuman, refAigc]) {
    if (ref && ref.mean) {
      const n = ref.mean.length;
      const interpMean = d3.scaleLinear().domain(d3.range(0, 1.001, 1/(n-1))).range(ref.mean);
      const interpStd  = d3.scaleLinear().domain(d3.range(0, 1.001, 1/(n-1))).range(ref.std);
      for (let i = 0; i < n; i++) {
        const x = i / (n-1);
        const m = interpMean(x);
        const s = interpStd(x) * 3;
        yMin = Math.min(yMin, m - s);
        yMax = Math.max(yMax, m + s);
      }
    }
  }
  if (data && data.length) {
    for (const d of data) { yMin = Math.min(yMin, d.value); yMax = Math.max(yMax, d.value); }
  }
  const yPad = (yMax - yMin) * 0.1 || 0.5;
  const yDomain = [yMin - yPad, yMax + yPad];
  const yScale = d3.scaleLinear().domain(yDomain).range([h, 0]);

  // Reference bands (±3σ) + mean line
  for (const [grp, ref] of [['human', refHuman], ['aigc', refAigc]]) {
    if (!ref || !ref.mean) continue;
    const n = ref.mean.length;
    const xGrid = d3.range(0, 1.001, 1/(n-1));
    const interpMean = d3.scaleLinear().domain(d3.range(0, 1.001, 1/(n-1))).range(ref.mean);
    const interpStd  = d3.scaleLinear().domain(d3.range(0, 1.001, 1/(n-1))).range(ref.std);
    const color = grp === 'human' ? '#2e86ab' : '#ca562c';

    g.append('path')
      .datum(xGrid.map(x => ({x, y0: interpMean(x) - 3*interpStd(x), y1: interpMean(x) + 3*interpStd(x)})))
      .attr('fill', color).attr('opacity', 0.08)
      .attr('d', d3.area().x(d=>xScale(d.x)).y0(d=>yScale(d.y0)).y1(d=>yScale(d.y1)));

    g.append('path')
      .datum(xGrid.map(x => ({x, y: interpMean(x)})))
      .attr('fill','none').attr('stroke', color).attr('stroke-width', 1.5)
      .attr('stroke-dasharray', grp==='human'?'':'4,3')
      .attr('d', d3.line().x(d=>xScale(d.x)).y(d=>yScale(d.y)));

    g.append('text')
      .attr('x', w + 2).attr('y', yScale(interpMean(1)))
      .attr('fill', color).attr('font-size', 10).attr('dy', '0.32em')
      .text(grp === 'human' ? 'Human' : 'AIGC');
  }

  // Data curve
  if (data && data.length > 1) {
    const line = d3.line()
      .x(d => xScale(d.pos)).y(d => yScale(d.value)).curve(d3.curveMonotoneX);
    g.append('path').datum(data).attr('fill','none').attr('stroke','#111').attr('stroke-width', 2).attr('d', line);

    const tip = document.getElementById('tooltip');
    g.selectAll('.hv').data(data).enter().append('circle')
      .attr('cx', d => xScale(d.pos)).attr('cy', d => yScale(d.value))
      .attr('r', 6).attr('fill', 'transparent')
      .on('mouseover', (ev, d) => {
        tip.textContent = `pos=${d.pos.toFixed(3)}  ${opts.yLabel}=${(opts.fmt||(v=>v.toFixed(3)))(d.value)}`;
        tip.classList.add('show');
      })
      .on('mousemove', ev => {
        const r = container.getBoundingClientRect();
        tip.style.left = (ev.clientX - r.left + 12) + 'px';
        tip.style.top = (ev.clientY - r.top - 28) + 'px';
      })
      .on('mouseout', () => tip.classList.remove('show'));
  }

  // Axes
  g.append('g').attr('transform', `translate(0,${h})`).call(d3.axisBottom(xScale).ticks(6)).selectAll('text').attr('font-size','9');
  g.append('g').call(d3.axisLeft(yScale).ticks(5)).selectAll('text').attr('font-size','9');
  g.append('text').attr('x', w/2).attr('y', h+20).attr('text-anchor','middle').attr('font-size','10').attr('fill','#666').text(opts.hideX ? '' : 'Normalized text position');
  g.append('text').attr('x', -h/2).attr('y', -34).attr('text-anchor','middle').attr('transform','rotate(-90)').attr('font-size','10').attr('fill','#666').text(opts.yLabel);
}

function updateMetrics(feats, distH, distA) {
  const cards = [
    { id:'mFinalEntropy', val: feats.final_entropy.toFixed(3), sub: () => `z(H)=${distH.zs.final_entropy_z.toFixed(2)}  z(A)=${distA.zs.final_entropy_z.toFixed(2)}` },
    { id:'mCompRatio', val: feats.compression_ratio_zlib !== undefined ? feats.compression_ratio_zlib.toFixed(3) : 'N/A',
      sub: () => feats.compression_ratio_zlib ? `z(H)=${distH.zs.compression_ratio_zlib_z.toFixed(2)}  z(A)=${distA.zs.compression_ratio_zlib_z.toFixed(2)}` : '' },
    { id:'mPuncRatio', val: feats.punctuation_ratio.toFixed(3), sub: () => `z(H)=${distH.zs.punctuation_ratio_z.toFixed(2)}  z(A)=${distA.zs.punctuation_ratio_z.toFixed(2)}` },
    { id:'mUniqueRatio', val: feats.unique_ratio.toFixed(3), sub: () => `z(H)=${distH.zs.unique_ratio_z.toFixed(2)}  z(A)=${distA.zs.unique_ratio_z.toFixed(2)}` },
  ];
  for (const c of cards) {
    document.getElementById(c.id).textContent = c.val;
    document.getElementById(c.id+'Sub').innerHTML = c.sub();
  }
}

async function analyze(rawText) {
  if (!rawText || !rawText.trim()) return;

  // Strip markdown formatting before analysis
  const isMd = /^#|\[.*\]\(|```|\*\*/.test(rawText.trim());
  const text = isMd ? stripMarkdown(rawText) : rawText.trim();

  // Show cleaned text in textarea
  document.getElementById('textInput').value = text;
  if (isMd) {
    document.getElementById('fileName').textContent =
      '(Markdown 格式已剥离为纯文本)';
  }

  // Scalar features (sync)
  const feats = extractScalarFeatures(text);
  if (!feats) return;

  // Compression (async) — use plain text
  feats.compression_ratio_zlib = await compressionRatio(text);

  const distH = profileDistance(feats, REF.human);
  const distA = profileDistance(feats, REF.aigc);

  // Compute all curves
  const entCurve = localEntropyCurve(text);
  const puncCurve = localPunctuationCurve(text);
  const uniqCurve = localUniqueCurve(text);
  const compCurve = await localCompressionCurve(text);

  // Render all curves
  renderEntropyCurve(entCurve);
  renderMetricCurve('compCurve', compCurve, REF.human.compression_ratio_curve, REF.aigc.compression_ratio_curve, {
    yLabel: 'Compression ratio', height: 250, hideX: true,
    fmt: v => v.toFixed(3),
  });
  renderMetricCurve('puncCurve', puncCurve, REF.human.punctuation_ratio_curve, REF.aigc.punctuation_ratio_curve, {
    yLabel: 'Punctuation ratio', height: 250, hideX: true,
    fmt: v => v.toFixed(4),
  });
  renderMetricCurve('uniqCurve', uniqCurve, REF.human.unique_ratio_curve, REF.aigc.unique_ratio_curve, {
    yLabel: 'Unique ratio', height: 250,
    fmt: v => v.toFixed(4),
  });
  renderRadar(feats);
  updateMetrics(feats, distH, distA);
}

// ════════════════════════════════════════════════════════════════
// 5. Input handling
// ════════════════════════════════════════════════════════════════

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const textInput = document.getElementById('textInput');
const analyzeBtn = document.getElementById('analyzeBtn');
const fileName = document.getElementById('fileName');
let loadedFileText = null;

// Drag & drop
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

// File picker
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

function loadFile(file) {
  fileName.textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    loadedFileText = e.target.result;
    textInput.value = loadedFileText;  // show full raw text
    analyze(loadedFileText);            // strip & compute
  };
  reader.readAsText(file);
}

// Analyze button: use textarea content
analyzeBtn.addEventListener('click', () => {
  const txt = textInput.value.trim();
  if (txt) analyze(txt);
});

// Allow Enter to trigger from textarea
textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) analyze(textInput.value);
});
</script>
